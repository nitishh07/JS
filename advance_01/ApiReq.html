<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121;">
    Value	State	Description
0	UNSENT	Client has been created. open() not called yet.
1	OPENED	open() has been called.
2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
3	LOADING	Downloading; responseText holds partial data.
4	DONE	The operation is complete.
UNSENT
<div id="insert">
    <button id="btn">Show</button>
</div>
</body>
<script>
    //AJAX
    const requestUrl = 'https://api.github.com/users/nitishh07';
    const xhr = new XMLHttpRequest();
    let data;

    xhr.open('GET', requestUrl);

    xhr.onreadystatechange = function(){
        console.log(xhr.readyState);
        console.log(this.responseText);

        if(xhr.readyState === 4){
            data = JSON.parse(this.responseText);
            console.log(typeof data);
            console.log(data.followers);

        }
    }
    xhr.send();

    const insert = document.querySelector("#insert");
    const btn = document.querySelector("#btn");

    btn.addEventListener("click", function(){
        let avatar_url = "https://avatars.githubusercontent.com/u/168955243?v=4";

        insert.innerHTML = `
            <div class="card" style="color:white" width="100px">
            <img src="${avatar_url}" alt="GitHub profile avatar for nitishh07" width="100px">
            <div class="container">
            <h4><b>${data.followers}</b></h4>
            </div>
        </div>`
    }); 
</script>
</html>
